<!DOCTYPE html>
<html lang="en" style="background:#0a0608;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aelthyra — World Map | The Veil Unbound</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:            #0a0608;
    --parchment:      #f0e6d0;
    --parchment-dark: #d4c4a0;
    --gold:           #c9a84c;
    --gold-bright:    #e8c96a;
    --blood:          #8b1a1a;
    --blood-bright:   #c0392b;
    --mist:           #7a8fa6;
    --shadow:         #1a0f1e;

    /* Marker palette */
    --marker-city:          #39ff6a;   /* bright green  — major city    */
    --marker-city-glow:     rgba(57,255,106,0.45);
    --marker-town:          #7dc97d;   /* soft green    — minor town     */
    --marker-town-glow:     rgba(125,201,125,0.35);
    --marker-poi-visited:   #e8c96a;   /* bright gold   — visited POI    */
    --marker-poi-glow:      rgba(232,201,106,0.5);
    --marker-poi-unvisited: #b8a84a;   /* soft yellow   — unvisited POI  */
    --marker-poi-un-glow:   rgba(184,168,74,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; border:0; outline:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0608; border:none; outline:none; }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--parchment);
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  #topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    height: 52px;
    background: rgba(10,6,8,0.96);
    border-bottom: 1px solid rgba(201,168,76,0.18);
    z-index: 100;
    gap: 1rem;
  }

  .topbar-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.12em;
    white-space: nowrap;
  }

  .topbar-subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--mist);
    opacity: 0.7;
  }

  /* Legend */
  #legend {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--parchment-dark);
    white-space: nowrap;
    opacity: 0.85;
  }

  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Zoom controls */
  #zoom-controls {
    display: flex;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  .zoom-btn {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    width: 28px; height: 28px;
    border-radius: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    line-height: 1;
    padding-bottom: 1px;
  }
  .zoom-btn:hover { background: rgba(201,168,76,0.22); }

  /* ── MAP STAGE ── */
  #stage {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
    background: #0a0608;
  }
  #stage.dragging { cursor: grabbing; }

  #map-root {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
    line-height: 0;
    background: #0a0608;
  }

  #map-root img {
    display: block;
    width: 1232px;
    height: 812px;
    user-select: none;
    -webkit-user-drag: none;
    filter: brightness(0.9) contrast(1.05) saturate(0.92);
    border: none;
    outline: none;
    display: block;
  }

  /* SVG overlay — same size as image */
  #map-svg {
    position: absolute;
    top: 0; left: 0;
    width: 1232px;
    height: 812px;
    overflow: visible;
  }

  /* ── REGION ZONES ── */
  .region-zone {
    fill: transparent;
    stroke: none;
    cursor: default;
    transition: fill 0.35s;
  }
  .region-zone:hover { fill: rgba(201,168,76,0.06); }
  .region-zone.danger:hover { fill: rgba(224,90,58,0.07); }
  .region-zone.mystery:hover { fill: rgba(168,85,247,0.06); }

  /* ── MARKERS ── */
  .marker { cursor: pointer; }
  .marker .pulse-ring {
    fill: none;
    animation: pulseRing 2.8s ease-out infinite;
  }
  @keyframes pulseRing {
    0%   { r: 10; opacity: 0.8; }
    100% { r: 22; opacity: 0; }
  }

  .marker .inner-dot { transition: r 0.2s ease; }
  .marker:hover .inner-dot { r: 9; }



  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    z-index: 500;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    max-width: 260px;
  }
  #tooltip.visible { opacity: 1; }

  .tt-inner {
    background: rgba(7,3,5,0.97);
    border: 1px solid rgba(201,168,76,0.3);
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
    padding: 0.85rem 1.05rem 0.9rem;
  }

  .tt-category {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .tt-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 0.55rem;
  }

  .tt-divider {
    height: 1px;
    background: linear-gradient(to right, rgba(201,168,76,0.4), transparent);
    margin-bottom: 0.55rem;
  }

  .tt-desc {
    font-size: 0.82rem;
    font-style: italic;
    line-height: 1.6;
    color: var(--parchment-dark);
  }

  .tt-status {
    margin-top: 0.55rem;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* ── REGION TOOLTIP (different style — lighter) ── */
  #region-tooltip {
    position: fixed;
    z-index: 490;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    max-width: 220px;
  }
  #region-tooltip.visible { opacity: 1; }

  .rtt-inner {
    background: rgba(7,3,5,0.88);
    border: 1px solid rgba(201,168,76,0.15);
    padding: 0.6rem 0.85rem;
  }

  .rtt-name {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }

  .rtt-desc {
    font-size: 0.78rem;
    font-style: italic;
    color: var(--parchment-dark);
    line-height: 1.5;
    opacity: 0.85;
  }

  /* ── DETAIL PANEL (click) ── */
  #detail-panel {
    position: fixed;
    top: 52px; right: 0;
    width: 300px;
    height: calc(100% - 52px);
    background: rgba(7,3,5,0.97);
    border-left: 1px solid rgba(201,168,76,0.2);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  #detail-panel.open { transform: translateX(0); }

  #detail-panel-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: none;
    border: none;
    color: var(--mist);
    font-size: 1rem;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    transition: color 0.2s;
    z-index: 10;
  }
  #detail-panel-close:hover { color: var(--gold); }

  .dp-header {
    padding: 2rem 1.5rem 1rem;
    border-bottom: 1px solid rgba(201,168,76,0.12);
    flex-shrink: 0;
  }

  .dp-category {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .dp-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.3rem;
    color: var(--parchment);
    line-height: 1.2;
    margin-bottom: 0.2rem;
  }

  .dp-region {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--mist);
    text-transform: uppercase;
  }

  .dp-body {
    padding: 1.25rem 1.5rem;
    flex: 1;
  }

  .dp-desc {
    font-size: 0.92rem;
    font-style: italic;
    line-height: 1.75;
    color: var(--parchment-dark);
    margin-bottom: 1.25rem;
  }

  .dp-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: auto;
  }

  .dp-tag {
    font-family: 'Cinzel', serif;
    font-size: 0.52rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border-radius: 2px;
    border: 1px solid;
  }

  .dp-tag-visited   { color: var(--marker-city);          border-color: rgba(57,255,106,0.35);   background: rgba(57,255,106,0.08);  }
  .dp-tag-poi       { color: var(--marker-poi-visited);   border-color: rgba(232,201,106,0.35);  background: rgba(232,201,106,0.08); }
  .dp-tag-unvisited { color: var(--marker-poi-unvisited); border-color: rgba(184,168,74,0.3);    background: rgba(184,168,74,0.07);  }
  .dp-tag-neutral   { color: var(--mist);                 border-color: rgba(122,143,166,0.3);   background: rgba(122,143,166,0.07); }

  /* ── COORD HINT ── */
  #coord-hint {
    position: fixed;
    bottom: 0.75rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.35);
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.4s;
  }

  /* ── BACK BUTTON ── */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    color: var(--mist);
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 0.4rem 0.75rem;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 2px;
    transition: color 0.25s, border-color 0.25s, background 0.25s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .back-btn:hover {
    color: var(--gold);
    border-color: rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.06);
  }
  .back-arrow {
    font-size: 0.85rem;
    line-height: 1;
    transition: transform 0.25s;
  }
  .back-btn:hover .back-arrow {
    transform: translateX(-3px);
  }
</style>
</head>

<script>
// ═══════════════════════════════════════════
//  PAN & ZOOM
// ═══════════════════════════════════════════
const stage    = document.getElementById('stage');
const mapRoot  = document.getElementById('map-root');
const MAP_W    = 1232;
const MAP_H    = 812;

let scale = 1, tx = 0, ty = 0;
let isDragging = false, dragStartX, dragStartY, dragTx, dragTy;

function clampTranslate(x, y, s) {
  const sw = stage.clientWidth;
  const sh = stage.clientHeight;
  const mw = MAP_W * s;
  const mh = MAP_H * s;
  // Min: right/bottom edge of map must not go past right/bottom of stage
  const minX = Math.min(0, sw - mw);
  const minY = Math.min(0, sh - mh);
  // Max: left/top edge of map must not go past left/top of stage
  // If map is wider than stage, maxX is 0 (left edge flush). 
  // If map is narrower (shouldn't happen with cover), center it.
  const maxX = mw >= sw ? 0 : (sw - mw) / 2;
  const maxY = mh >= sh ? 0 : (sh - mh) / 2;
  return [
    Math.max(minX, Math.min(maxX, x)),
    Math.max(minY, Math.min(maxY, y))
  ];
}

function applyTransform(animated) {
  mapRoot.style.transition = animated ? 'transform 0.25s ease' : 'none';
  mapRoot.style.transform  = `translate(${tx}px,${ty}px) scale(${scale})`;
}

function fitToStage() {
  const sw = stage.clientWidth;
  const sh = stage.clientHeight;
  // COVER: scale so map fills the stage with no gutters on either axis
  scale = Math.max(sw / MAP_W, sh / MAP_H);
  // Center the map — tx/ty will be 0 or negative (map larger than stage)
  tx = (sw - MAP_W * scale) / 2;
  ty = (sh - MAP_H * scale) / 2;
  // Clamp to ensure no overshoot on either edge
  ;[tx, ty] = clampTranslate(tx, ty, scale);
  // Store as minimum zoom floor
  window._minScale = scale;
  applyTransform(true);
}

function zoomAt(cx, cy, factor) {
  const newScale = Math.max(window._minScale || 0.5, Math.min(3, scale * factor));
  const ratio    = newScale / scale;
  tx = cx - ratio * (cx - tx);
  ty = cy - ratio * (cy - ty);
  scale = newScale;
  ;[tx, ty] = clampTranslate(tx, ty, scale);
  applyTransform(true);
}

// Mouse wheel zoom
stage.addEventListener('wheel', e => {
  e.preventDefault();
  const rect   = stage.getBoundingClientRect();
  const cx     = e.clientX - rect.left;
  const cy     = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  zoomAt(cx, cy, factor);
}, { passive: false });

// Drag pan
stage.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging  = true;
  dragStartX  = e.clientX;
  dragStartY  = e.clientY;
  dragTx      = tx;
  dragTy      = ty;
  stage.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  ;[tx, ty] = clampTranslate(dragTx + dx, dragTy + dy, scale);
  applyTransform(false);
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  stage.classList.remove('dragging');
});

// Touch
let lastTouchDist = null;
stage.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    dragTx = tx; dragTy = ty;
  }
  if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.hypot(dx, dy);
  }
}, { passive: true });
stage.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - dragStartX;
    const dy = e.touches[0].clientY - dragStartY;
    ;[tx, ty] = clampTranslate(dragTx + dx, dragTy + dy, scale);
    applyTransform(false);
  }
  if (e.touches.length === 2 && lastTouchDist) {
    const dx   = e.touches[0].clientX - e.touches[1].clientX;
    const dy   = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const cx   = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy   = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const rect = stage.getBoundingClientRect();
    zoomAt(cx - rect.left, cy - rect.top, dist / lastTouchDist);
    lastTouchDist = dist;
  }
}, { passive: false });
stage.addEventListener('touchend', () => {
  isDragging    = false;
  lastTouchDist = null;
});

// Buttons
document.getElementById('btn-zoom-in').addEventListener('click',    () => { if (scale < 3) zoomAt(stage.clientWidth/2, stage.clientHeight/2, 1.3); });
document.getElementById('btn-zoom-out').addEventListener('click',   () => { if (scale > (window._minScale || 0.5)) zoomAt(stage.clientWidth/2, stage.clientHeight/2, 0.77); });
document.getElementById('btn-zoom-reset').addEventListener('click', fitToStage);

// Init
window.addEventListener('load', fitToStage);
window.addEventListener('resize', fitToStage);

// ═══════════════════════════════════════════
//  MARKER TOOLTIP
// ═══════════════════════════════════════════
const tooltip    = document.getElementById('tooltip');
const ttCategory = document.getElementById('tt-category');
const ttName     = document.getElementById('tt-name');
const ttDesc     = document.getElementById('tt-desc');
const ttStatus   = document.getElementById('tt-status');

const markerColors = {
  'city':         { cat: '#39ff6a', name: '#f0e6d0', status: '#7dc97d' },
  'town':         { cat: '#7dc97d', name: '#f0e6d0', status: '#7dc97d' },
  'poi-visited':  { cat: '#e8c96a', name: '#f0e6d0', status: '#e8c96a' },
  'poi-unvisited':{ cat: '#b8a84a', name: '#d4c4a0', status: '#b8a84a' },
};

let tooltipTarget = null;

document.querySelectorAll('.marker').forEach(m => {
  m.addEventListener('mouseenter', () => {
    tooltipTarget = m;
    const type  = m.dataset.type;
    const colors = markerColors[type] || markerColors['town'];
    ttCategory.textContent  = m.dataset.category;
    ttCategory.style.color  = colors.cat;
    ttName.textContent      = m.dataset.name;
    ttName.style.color      = colors.name;
    ttDesc.textContent      = m.dataset.desc;
    ttStatus.textContent    = m.dataset.status;
    ttStatus.style.color    = colors.status;
    tooltip.classList.add('visible');
  });

  m.addEventListener('mousemove', e => {
    positionTooltip(e.clientX, e.clientY, tooltip, 270);
  });

  m.addEventListener('mouseleave', () => {
    tooltipTarget = null;
    tooltip.classList.remove('visible');
  });
});

function positionTooltip(mx, my, el, w) {
  const pad = 16;
  let x = mx + pad;
  let y = my + pad;
  if (x + w > window.innerWidth  - 10) x = mx - w - pad;
  if (y + 200 > window.innerHeight - 10) y = my - 200 - pad;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
}

// ═══════════════════════════════════════════
//  REGION TOOLTIP
// ═══════════════════════════════════════════
const regionTooltip = document.getElementById('region-tooltip');
const rttName = document.getElementById('rtt-name');
const rttDesc = document.getElementById('rtt-desc');

document.querySelectorAll('.region-zone').forEach(r => {
  r.addEventListener('mouseenter', () => {
    rttName.textContent = r.dataset.region;
    rttDesc.textContent = r.dataset.desc;
    regionTooltip.classList.add('visible');
  });
  r.addEventListener('mousemove', e => {
    positionTooltip(e.clientX, e.clientY, regionTooltip, 230);
  });
  r.addEventListener('mouseleave', () => {
    regionTooltip.classList.remove('visible');
  });
});

// ═══════════════════════════════════════════
//  DETAIL PANEL
// ═══════════════════════════════════════════
const panel      = document.getElementById('detail-panel');
const dpCategory = document.getElementById('dp-category');
const dpName     = document.getElementById('dp-name');
const dpRegion   = document.getElementById('dp-region');
const dpDesc     = document.getElementById('dp-desc');
const dpTags     = document.getElementById('dp-tags');

const tagClassMap = {
  'visited': 'dp-tag-visited',
  'origin':  'dp-tag-visited',
  'major-city': 'dp-tag-visited',
  'poi':     'dp-tag-poi',
  'explored':'dp-tag-poi',
  'unvisited':'dp-tag-unvisited',
  'hagcraft':'dp-tag-unvisited',
};

const markerPanelColors = {
  'city':         '#39ff6a',
  'town':         '#7dc97d',
  'poi-visited':  '#e8c96a',
  'poi-unvisited':'#b8a84a',
};

document.querySelectorAll('.marker').forEach(m => {
  m.addEventListener('click', e => {
    e.stopPropagation();
    const type  = m.dataset.type;
    const color = markerPanelColors[type] || '#c9a84c';
    const [cat, region] = (m.dataset.category || '').split(' · ');
    dpCategory.textContent = cat || '';
    dpCategory.style.color = color;
    dpName.textContent     = m.dataset.name;
    dpName.style.color     = '#f0e6d0';
    dpRegion.textContent   = region || '';
    dpDesc.textContent     = m.dataset.desc;
    dpTags.innerHTML = (m.dataset.tags || '').split(',').map(t => {
      const cls = tagClassMap[t.trim()] || 'dp-tag-neutral';
      return `<span class="dp-tag ${cls}">${t.trim().replace(/-/g,' ')}</span>`;
    }).join('');
    panel.classList.add('open');
    tooltip.classList.remove('visible');
  });
});

document.getElementById('detail-panel-close').addEventListener('click', () => {
  panel.classList.remove('open');
});

stage.addEventListener('click', e => {
  if (!e.target.closest('.marker')) panel.classList.remove('open');
});

// Hide coord hint after first interaction
let hintHidden = false;
stage.addEventListener('wheel',     hideHint, { once: true });
stage.addEventListener('mousedown', hideHint, { once: true });
function hideHint() {
  if (hintHidden) return;
  hintHidden = true;
  document.getElementById('coord-hint').style.opacity = '0';
}
</script>
